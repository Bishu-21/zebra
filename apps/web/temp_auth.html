<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zebra AI Authentication Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FAFAFA",
                        "background-dark": "#0A0A0A",
                        "zebra-black": "#050505",
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.8);
        }
        .liquid-bg {
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.05) 55%, transparent 60%);
            background-size: 100% 100%, 200% 200%;
            animation: shimmer 8s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 50% 50%, 0% 0%; }
            100% { background-position: 50% 50%, 200% 200%; }
        }
    </style>
</head>
<body class="bg-background-dark text-white font-body antialiased h-screen w-full flex overflow-hidden">
<div class="hidden lg:flex w-1/2 h-full relative flex-col justify-center items-center overflow-hidden bg-zebra-black">
<div class="absolute inset-0 z-0">
<img alt="Liquid Texture Background" class="w-full h-full object-cover opacity-60 grayscale brightness-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDepkU4QtMyahTBntdkXNihfWvtk6gYGXvjn8Wm3FuT-ONvLKb5vJpa1JV4XFwC2kx3y3VOY3cNoLFfU4Kv60B1kxrtJanyYBwgHErR1jetKqkRAX2XQ-3DdFRNI9xo-4-0H7kV1AwZ-3dDeE8l6AOUAD3tqYoWBL8nN3POOhq_13vVVIwo4QTgNWbtPGJryHh4SWBrbYBYRB2cy36kK6ycJiew794B24CA_ubnFYy8oaR_Kwg8L37hO5gt8pm_TEq0nWXZAUeesDU"/>
<div class="absolute inset-0 bg-black/50 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-gradient-to-br from-transparent via-black/40 to-black"></div>
<div class="liquid-bg absolute inset-0 opacity-30 mix-blend-overlay"></div>
</div>
<div class="relative z-10 p-12 text-center">
<h1 class="font-display text-4xl md:text-5xl lg:text-6xl font-light tracking-tight text-[#FAFAFA] leading-tight">
                Step inside.<br/>
                Your next interview awaits.
            </h1>
</div>
<div class="absolute bottom-8 left-8 z-10 flex items-center gap-2">
<span class="w-6 h-6 bg-white rounded-full flex items-center justify-center">
<span class="w-3 h-3 bg-black rounded-full"></span>
</span>
<span class="font-display font-bold text-sm tracking-widest uppercase text-white/80">Zebra.ai</span>
</div>
</div>
<div class="w-full lg:w-1/2 h-full bg-[#0A0A0A] flex items-center justify-center p-6 relative">
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-white/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="glass-card w-full max-w-[420px] p-10 rounded-2xl relative z-10">
<div class="text-center mb-8">
<h2 class="font-display font-bold text-3xl text-[#FAFAFA] mb-2">Welcome back</h2>
<p class="text-white/60 text-sm">Enter your credentials to access your workspace.</p>
</div>
<button class="w-full flex items-center justify-center gap-3 bg-transparent border border-white hover:bg-white/10 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 group">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" style="fill:white;"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" style="fill:white;"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" style="fill:white;"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" style="fill:white;"></path>
</svg>
                Continue with Google
            </button>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/20"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-[#0A0A0A] text-white/40 glass-text-bg">or</span>
</div>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="block text-xs font-medium text-white/80 uppercase tracking-wider" for="email">Email</label>
<input class="block w-full px-0 py-2 bg-transparent border-0 border-b border-white/20 text-white placeholder-white/30 focus:ring-0 focus:border-white focus:outline-none transition-colors sm:text-sm" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex items-center justify-between">
<label class="block text-xs font-medium text-white/80 uppercase tracking-wider" for="password">Password</label>
</div>
<input class="block w-full px-0 py-2 bg-transparent border-0 border-b border-white/20 text-white placeholder-white/30 focus:ring-0 focus:border-white focus:outline-none transition-colors sm:text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center justify-between pt-2">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-white/20 bg-transparent text-white focus:ring-offset-gray-900 focus:ring-white/20" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-xs text-white/60" for="remember-me">Remember me</label>
</div>
<a class="text-xs font-medium text-white/60 hover:text-white transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-[#0A0A0A] bg-[#FAFAFA] hover:bg-white/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-white focus:ring-offset-gray-900 transition-all duration-200 mt-4" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-white/60">
                    Don't have an account? 
                    <a class="font-medium text-white hover:underline decoration-white/50 underline-offset-4" href="#">Create an account</a>
</p>
</div>
</div>
</div>
<div class="absolute top-6 left-6 lg:hidden z-50">
<span class="font-display font-bold text-lg tracking-tight text-white">Zebra.ai</span>
</div>

</body></html>
