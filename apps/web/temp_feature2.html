<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fix Old Resume | Zebra AI</title>
<!-- BEGIN: Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zebraBlack: '#0A0A0A',
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
<!-- Lucide Icons (UMD version) -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- END: Scripts -->
<style data-purpose="custom-animations">
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); }
      50% { filter: drop-shadow(0 0 25px rgba(255,255,255,0.9)); }
    }
    .animate-glow {
      animation: glow 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">
<!-- BEGIN: MainContainer -->
<main class="min-h-screen w-full flex flex-col items-center justify-center bg-[#0A0A0A] p-6 font-sans">
<!-- BEGIN: HeaderSection -->
<header class="text-center z-10" data-purpose="page-header">
<h1 class="text-4xl md:text-5xl font-light text-white mb-4 tracking-tight">
        Fix Old Resume
      </h1>
<p class="text-white/60 text-lg max-w-xl text-center leading-relaxed">
        Upload your unpolished PDF. Our AI parses the data, fixes the formatting, and rewrites your impact.
      </p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: MainLayout -->
<section class="flex flex-col md:flex-row items-center justify-center gap-12 mt-16 w-full max-w-5xl" data-purpose="workflow-container">
<!-- BEGIN: UploadArea -->
<div class="aspect-[1/1.4] w-72 rounded-xl border-2 border-dashed border-white/20 bg-white/[0.02] flex flex-col items-center justify-center cursor-pointer hover:border-white/50 transition-all group overflow-hidden relative" data-purpose="upload-dropzone">
<div class="flex flex-col items-center justify-center space-y-4">
<i class="w-12 h-12 text-white/50 group-hover:text-white transition-colors" data-lucide="file-text" stroke-width="1"></i>
<span class="text-white/50 group-hover:text-white text-sm font-light tracking-wide transition-colors">
            Drop old PDF here
          </span>
</div>
<!-- Subtle gradient overlay on hover -->
<div class="absolute inset-0 bg-white/[0.01] opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<!-- END: UploadArea -->
<!-- BEGIN: TransformationIcon -->
<div class="flex items-center justify-center" data-purpose="transformation-indicator">
<div class="animate-glow">
<i class="w-12 h-12 text-white" data-lucide="wand2"></i>
</div>
</div>
<!-- END: TransformationIcon -->
<!-- BEGIN: OutputPreview -->
<div class="aspect-[1/1.4] w-72 rounded-xl border border-white/20 bg-transparent flex flex-col overflow-hidden relative shadow-2xl shadow-white/5" data-purpose="output-preview">
<!-- BEGIN: SimulatedDocumentLines -->
<div class="absolute inset-0 flex flex-col p-6 space-y-4 opacity-20" data-purpose="mock-document-structure">
<!-- Header block -->
<div class="h-2 w-1/3 bg-white/40 mb-2"></div>
<div class="h-1 w-full bg-white/20"></div>
<!-- Body content (15 lines simulated with borders/divs) -->
<div class="flex-1 divide-y divide-white/10">
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
<div class="py-2 h-4"></div>
</div>
</div>
<!-- END: SimulatedDocumentLines -->
<!-- Central Status Label -->
<div class="m-auto z-20 px-4 py-2 bg-[#0A0A0A]/80 backdrop-blur-sm border border-white/10 rounded-sm">
<p class="text-white/80 font-mono text-xs tracking-widest uppercase">
            ATS Optimized Output
          </p>
</div>
</div>
<!-- END: OutputPreview -->
</section>
<!-- END: MainLayout -->
<!-- BEGIN: FooterDetails -->
<footer class="mt-20 text-white/20 text-[10px] tracking-[0.2em] uppercase">
      Secure • Monochrome • AI-Powered
    </footer>
<!-- END: FooterDetails -->
</main>
<!-- END: MainContainer -->
<script data-purpose="icon-initialization">
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body></html>
