<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zebra | Build Your Foundation</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0A0A0A;
      color: #FAFAFA;
      margin: 0;
      overflow: hidden;
    }

    /* Custom scrollbar for left pane if needed */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0A0A0A;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
  </style>
<style data-purpose="input-overrides">
    /* Remove default focus ring and handle Vercel-style bottom border */
    .vercel-input:focus {
      outline: none;
      box-shadow: none;
      border-color: #FAFAFA;
    }
    
    /* Smooth transition for input labels/focus */
    .vercel-input {
      transition: border-color 0.3s ease;
    }
  </style>
</head>
<body class="h-screen w-full flex overflow-hidden">
<!-- BEGIN: LeftPane -->
<aside class="w-[40%] h-full border-r border-white/10 p-12 flex flex-col justify-between custom-scrollbar overflow-y-auto bg-[#0A0A0A]" data-purpose="workspace-sidebar">
<!-- Header and Form Section -->
<section>
<!-- Logo/Brand -->
<div class="mb-16 flex items-center gap-2" data-purpose="brand-identity">
<div class="w-6 h-6 bg-white rounded-sm flex items-center justify-center">
<span class="text-[10px] text-black font-bold">Z</span>
</div>
<span class="text-sm font-medium tracking-widest uppercase">Zebra</span>
</div>
<h1 class="text-3xl font-light text-white mb-12 leading-tight">
        Let's build your <br/> foundation.
      </h1>
<!-- BEGIN: InputForm -->
<form class="space-y-8" data-purpose="user-data-collection" id="resume-init-form">
<!-- First Name Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest text-white/40 mb-1" for="firstName">First Name</label>
<input class="vercel-input bg-transparent border-0 border-b border-white/20 text-white py-4 w-full text-lg placeholder:text-white/10" id="firstName" placeholder="John" type="text"/>
</div>
<!-- Last Name Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest text-white/40 mb-1" for="lastName">Last Name</label>
<input class="vercel-input bg-transparent border-0 border-b border-white/20 text-white py-4 w-full text-lg placeholder:text-white/10" id="lastName" placeholder="Doe" type="text"/>
</div>
<!-- Target Role Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest text-white/40 mb-1" for="targetRole">Target Role</label>
<input class="vercel-input bg-transparent border-0 border-b border-white/20 text-white py-4 w-full text-lg placeholder:text-white/10" id="targetRole" placeholder="Senior Software Engineer" type="text"/>
</div>
</form>
<!-- END: InputForm -->
</section>
<!-- Footer Action -->
<footer class="mt-12">
<button class="group relative inline-flex items-center gap-3 px-8 py-3 rounded-full bg-white text-black font-medium transition-all hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] active:scale-95" type="button">
        Next Step
        <i class="w-4 h-4 transition-transform group-hover:translate-x-1" data-lucide="arrow-right"></i>
</button>
</footer>
</aside>
<!-- END: LeftPane -->
<!-- BEGIN: RightPane -->
<main class="w-[60%] h-full bg-[#0A0A0A] flex items-center justify-center relative overflow-hidden" data-purpose="preview-workspace">
<!-- Subtle Background Gradient for Depth -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white/5 via-transparent to-transparent opacity-50"></div>
<!-- BEGIN: PreviewWrapper -->
<div class="relative z-10 bg-white/5 backdrop-blur-xl p-12 rounded-[2.5rem] border border-white/10 shadow-2xl flex items-center justify-center" data-purpose="frosted-glass-container">
<!-- BEGIN: A4Preview -->
<div class="bg-white aspect-[1/1.414] w-[400px] rounded-sm shadow-inner p-8 flex items-center justify-center relative group cursor-zoom-in" data-purpose="resume-canvas-preview">
<!-- Simulation of a document structure -->
<div class="absolute top-4 left-4 right-4 h-1 bg-black/5 rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-black/20"></div>
</div>
<div class="text-center">
<div class="mb-4 flex justify-center">
<i class="text-black/20 w-12 h-12" data-lucide="file-text"></i>
</div>
<p class="text-black font-bold text-sm tracking-tight uppercase">
            Live LaTeX PDF Preview
          </p>
<p class="text-black/40 text-[10px] mt-1 font-medium italic">
            Rendering v1.0.4...
          </p>
</div>
<!-- Hover Overlay for "Expand" visual feel -->
<div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors duration-300"></div>
</div>
<!-- END: A4Preview -->
</div>
<!-- END: PreviewWrapper -->
<!-- Status Indicator -->
<div class="absolute bottom-8 right-8 flex items-center gap-2 text-white/40 text-[10px] tracking-widest uppercase">
<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
      Engine Ready
    </div>
</main>
<!-- END: RightPane -->
<!-- BEGIN: Scripts -->
<script data-purpose="icon-initialization">
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
<script data-purpose="form-interactivity">
    // Minimal logic for visual feedback on input
    const inputs = document.querySelectorAll('.vercel-input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        // Potential logic for updating the preview based on focus
      });
    });
  </script>
<!-- END: Scripts -->
</body></html>
